<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Соната-Крым - Главная</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="main-header">
    <div class="header-content">
      <h1>🚌 Соната-Крым</h1>
      <div class="user-info">
        <span id="userName"></span>
        <button id="logoutBtn" class="btn btn-secondary">Выход</button>
      </div>
    </div>
    <nav class="main-nav">
      <button class="nav-btn active" data-tab="sales">Продажи</button>
      <button class="nav-btn" data-tab="excursions">Экскурсии</button>
      <button class="nav-btn" data-tab="chat">Чат</button>
      <button class="nav-btn" data-tab="cashbox">Касса</button>
      <button class="nav-btn manager-only" data-tab="admin">Администрирование</button>
    </nav>
  </header>

  <main class="content">
    <!-- Вкладка продаж -->
    <section id="salesTab" class="tab-content active">
      <h2>Новая продажа</h2>
      <form id="saleForm" class="sale-form">
        <div class="form-row">
          <div class="form-group">
            <label>Экскурсия</label>
            <select id="excursionSelect" required></select>
          </div>
          <div class="form-group">
            <label>Дата</label>
            <input type="date" id="excursionDate" required>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Фамилия</label>
            <input type="text" id="surname" required>
          </div>
          <div class="form-group">
            <label>Телефон</label>
            <input type="tel" id="phone" required>
          </div>
          <div class="form-group">
            <label>Количество</label>
            <input type="number" id="quantity" min="1" value="1" required>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Место посадки</label>
            <select id="pickupPoint" required></select>
          </div>
          <div class="form-group">
            <label>Время посадки</label>
            <input type="text" id="pickupTime" readonly>
          </div>
        </div>
        
        <div class="form-row">
          <div class="form-group">
            <label>Общая сумма (руб)</label>
            <input type="number" id="totalAmount" min="0" required>
          </div>
          <div class="form-group">
            <label>Принято денег (руб)</label>
            <input type="number" id="paidAmount" min="0" required>
          </div>
          <div class="form-group">
            <label>Долг (руб)</label>
            <input type="number" id="debtAmount" min="0" value="0" readonly>
          </div>
        </div>
        
        <div class="form-group">
          <label>Примечание</label>
          <textarea id="note" rows="2"></textarea>
        </div>
        
        <button type="submit" class="btn btn-primary">Оформить продажу</button>
      </form>
      
      <div class="sales-stats">
        <h3>Текущие экскурсии</h3>
        <div id="activeExcursionsList" class="excursions-grid"></div>
      </div>
    </section>

    <!-- Вкладка экскурсий -->
    <section id="excursionsTab" class="tab-content">
      <h2>Список экскурсий</h2>
      <div class="controls">
        <input type="date" id="filterDate">
        <button id="printListBtn" class="btn btn-primary">Печать списка водителю</button>
      </div>
      <div id="excursionDetails"></div>
    </section>

    <!-- Вкладка чата -->
    <section id="chatTab" class="tab-content">
      <h2>Общий чат</h2>
      <div id="chatMessages" class="chat-messages"></div>
      <form id="chatForm" class="chat-form">
        <input type="text" id="chatInput" placeholder="Введите сообщение..." required>
        <button type="submit" class="btn btn-primary">Отправить</button>
      </form>
    </section>

    <!-- Вкладка кассы -->
    <section id="cashboxTab" class="tab-content">
      <h2>Касса</h2>
      <div id="myCashbox" class="cashbox-card">
        <h3>Моя касса</h3>
        <p class="cashbox-amount"><span id="myCashAmount">0</span> руб.</p>
      </div>
      
      <div class="manager-only">
        <h3>Касса всех реализаторов</h3>
        <table id="allCashboxTable" class="data-table">
          <thead>
            <tr>
              <th>Имя</th>
              <th>Точка</th>
              <th>Сумма</th>
              <th>Действие</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <!-- Вкладка администрирования -->
    <section id="adminTab" class="tab-content manager-only">
      <h2>Администрирование</h2>
      
      <div class="admin-sections">
        <div class="admin-section">
          <h3>Экскурсии</h3>
          <button class="btn btn-sm" onclick="showAdminModal('excursion')">Добавить</button>
          <div id="adminExcursionsList"></div>
        </div>
        
        <div class="admin-section">
          <h3>Точки продаж</h3>
          <button class="btn btn-sm" onclick="showAdminModal('point')">Добавить</button>
          <div id="adminPointsList"></div>
        </div>
        
        <div class="admin-section">
          <h3>Водители</h3>
          <button class="btn btn-sm" onclick="showAdminModal('driver')">Добавить</button>
          <div id="adminDriversList"></div>
        </div>
        
        <div class="admin-section">
          <h3>Экскурсоводы</h3>
          <button class="btn btn-sm" onclick="showAdminModal('guide')">Добавить</button>
          <div id="adminGuidesList"></div>
        </div>
        
        <div class="admin-section">
          <h3>Пользователи</h3>
          <button class="btn btn-sm" onclick="showAdminModal('user')">Добавить</button>
          <div id="adminUsersList"></div>
        </div>
        
        <div class="admin-section">
          <h3>Агенты</h3>
          <button class="btn btn-sm" onclick="showAdminModal('agent')">Добавить</button>
          <div id="adminAgentsList"></div>
        </div>
        
        <div class="admin-section">
          <h3>Шаблоны маршрутов</h3>
          <button class="btn btn-sm" onclick="showAdminModal('template')">Добавить</button>
          <div id="adminTemplatesList"></div>
        </div>
      </div>
      
      <div class="import-export">
        <h3>Импорт/Экспорт</h3>
        <input type="file" id="importFile" accept=".xlsx">
        <button id="importBtn" class="btn btn-primary">Импорт Excel</button>
        <button id="exportBtn" class="btn btn-secondary">Экспорт Excel</button>
      </div>
    </section>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
